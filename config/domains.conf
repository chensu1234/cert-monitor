# cert-monitor 域名配置文件
# 格式: domain:port (端口默认 443 可省略)
# 支持 # 注释

# ===========================================
# 公共域名示例
# ===========================================
github.com
google.com
cloudflare.com

# 显式指定端口
github.com:443

